<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging Payment - Node A</title>
    <style>
        /* (keep your existing CSS) */
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
</head>
<body>
    <!-- (keep your existing HTML structure) -->

    <script>
        function confirmPayment() {
            const energy = document.getElementById('energy').value;
            const confirmBtn = document.getElementById('confirmBtn');
            const successDiv = document.getElementById('successMessage');
            const errorDiv = document.getElementById('errorMessage');

            confirmBtn.disabled = true;
            confirmBtn.textContent = "⏳ Sending command...";
            successDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            // Use secure WebSockets (wss) on port 8884 for HTTPS pages
            const clientId = "web-client-" + Math.random().toString(36).substring(7);
            const client = new Paho.MQTT.Client("wss://broker.hivemq.com:8884", clientId);

            client.connect({
                onSuccess: function() {
                    console.log("Connected to MQTT broker");
                    const message = new Paho.MQTT.Message("AUTH," + energy);
                    message.destinationName = "nodeb/commands";
                    client.send(message);
                    console.log("Command sent: AUTH," + energy);
                    client.disconnect();

                    successDiv.style.display = 'block';
                    successDiv.innerHTML = `✅ Command sent! Charging started with ${energy} kWh credit.`;
                    
                    setTimeout(() => {
                        confirmBtn.disabled = false;
                        confirmBtn.textContent = "✅ I Have Sent the Money";
                    }, 5000);
                },
                onFailure: function(err) {
                    console.error("MQTT connection failed:", err);
                    errorDiv.style.display = 'block';
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = "✅ I Have Sent the Money";
                }
            });
        }
    </script>
</body>
</html>
