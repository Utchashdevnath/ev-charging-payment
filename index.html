<!DOCTYPE html>
<html>
<head>
    <title>MQTT Test</title>
    <!-- Load the MQTT library from a CDN -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
    <h1>MQTT Command Test</h1>
    <button id="sendBtn">Send Test Command to Node B</button>
    <p id="status">Ready</p>

    <script>
        const brokerUrl = 'ws://broker.emqx.io:8083/mqtt'; // Public broker, WebSocket port
        const clientId = 'web_client_' + Math.random().toString(16).substr(2, 8);
        const commandTopic = 'test/command/nodeA';

        const client = mqtt.connect(brokerUrl, { clientId: clientId });

        client.on('connect', function () {
            document.getElementById('status').innerText = 'Connected to MQTT broker!';
            console.log('Connected to MQTT broker');
        });

        client.on('error', function (err) {
            document.getElementById('status').innerText = 'Connection Error';
            console.error('Connection error: ', err);
        });

        document.getElementById('sendBtn').addEventListener('click', function() {
            const payload = "AUTH,5"; // The command for Node A
            client.publish(commandTopic, payload, { qos: 1 }, function(err) {
                if (!err) {
                    document.getElementById('status').innerText = 'Command sent: ' + payload;
                    console.log('Command sent successfully');
                } else {
                    document.getElementById('status').innerText = 'Publish failed';
                    console.error('Publish failed: ', err);
                }
            });
        });
    </script>
</body>
</html>
